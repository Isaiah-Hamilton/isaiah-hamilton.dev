<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="text-scale" content="scale" />
        <title>Isaiah | Software Engineer</title>
        <meta name="title" content="Isaiah | Software Engineer" />
        <meta
            name="description"
            content="Hi, I'm Isaiah, a software engineer specializing in building fast, scalable, and modern web applications. Explore my projects, skills, and get in touch."
        />
        <meta
            name="keywords"
            content="software engineer, full-stack developer, web developer, portfolio, React, Node.js, TypeScript"
        />
        <meta name="author" content="Isaiah Hamilton" />
        <link rel="icon" href="/pfp.jpg" />
        <link
            rel="stylesheet"
            type="text/css"
            href="https://esm.sh/@phosphor-icons/web@2.1.2/src/bold/style.css"
        />
        <script>
            const theme = localStorage.getItem("theme") === "true";
            document.documentElement.classList.toggle("dark", theme);
        </script>
        %sveltekit.head%
    </head>
    <body data-sveltekit-preload-data="hover">
        <div style="display: contents">%sveltekit.body%</div>
    </body>
</html>
